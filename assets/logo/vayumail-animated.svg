<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="vayumail">
  <!-- Animated wordmark: the mark draws itself on like a gust of wind,
       then the wordmark settles in. SMIL animation runs in browsers and
       when opened directly; some embedders (e.g. GitHub <img>) render
       the final frame statically. The in-app splash provides the live
       animation on device. -->
  <style>
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #F5F5F5 !important; }
      .word { fill: #F5F5F5 !important; }
    }
  </style>

  <g class="ink" fill="none" stroke="#0D0D0D" stroke-width="10"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 20 16 L 29 42" stroke-dasharray="30" stroke-dashoffset="30">
      <animate attributeName="stroke-dashoffset" from="30" to="0"
               begin="0.1s" dur="0.55s" fill="freeze"
               calcMode="spline" keySplines="0.2 0.7 0.3 1" keyTimes="0;1"/>
    </path>
    <path d="M 46 13 C 42 26, 36 37, 29 44" stroke-dasharray="44" stroke-dashoffset="44">
      <animate attributeName="stroke-dashoffset" from="44" to="0"
               begin="0.35s" dur="0.7s" fill="freeze"
               calcMode="spline" keySplines="0.2 0.7 0.3 1" keyTimes="0;1"/>
    </path>
  </g>

  <text class="word" x="78" y="41" opacity="0"
        font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="34" letter-spacing="-0.5" fill="#0D0D0D">
    <tspan font-weight="400">vayu</tspan><tspan font-weight="600">mail</tspan>
    <animate attributeName="opacity" from="0" to="1"
             begin="0.95s" dur="0.5s" fill="freeze"/>
  </text>
</svg>
