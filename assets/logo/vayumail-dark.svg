<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="vayumail">
  <!-- VayuMail wordmark, dark backgrounds. Identical geometry to
       vayumail.svg; all strokes and fills are #F5F5F5. Transparent
       background. Do not alter geometry (see assets/logo/README.md). -->
  <g fill="none" stroke="#F5F5F5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 20 16 L 29 42"/>
    <path d="M 46 13 C 42 26, 36 37, 29 44"/>
  </g>
  <text x="78" y="41" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="34" letter-spacing="-0.5" fill="#F5F5F5">
    <tspan font-weight="400">vayu</tspan><tspan font-weight="600">mail</tspan>
  </text>
</svg>
