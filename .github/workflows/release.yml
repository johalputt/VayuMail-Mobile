name: Release APK + AAB

# Builds BOTH Android artifacts with gogio on GitHub's runners (which
# carry the Android SDK + NDK) — the sovereign build machine when no
# local Android toolchain is available:
#   - vayumail-<version>.apk  — install/sideload directly on a device.
#   - vayumail-<version>.aab  — Android App Bundle for the Play Console
#     (Play requires an .aab, not an .apk, for new uploads).
# Both are built from the same source version and attached to the same
# GitHub Release, so every release carries a matching APK and AAB.
#
# Signing:
#   - If the repository secrets ANDROID_KEYSTORE_B64 / ANDROID_KEYSTORE_PASS
#     are set, both are signed with that release/upload key (Play Store
#     ready — keep that key safe; Play requires every update signed by it).
#   - Otherwise a fresh test key is generated in the run: fine for
#     sideloading the APK, but the AAB is NOT accepted by Play until it is
#     signed with your registered upload key.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.3.11579264 platform-tools'

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@latest

      - name: Prepare signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            echo "SIGN_PASS=$KEYSTORE_PASS" >> "$GITHUB_ENV"
            echo "SIGN_KIND=release" >> "$GITHUB_ENV"
          else
            keytool -genkeypair -v -keystore release.keystore \
              -storepass vayumail-test -keypass vayumail-test \
              -alias vayumail -keyalg RSA -keysize 4096 -validity 10000 \
              -dname "CN=VayuMail Test, O=VayuMail, C=IN"
            echo "SIGN_PASS=vayumail-test" >> "$GITHUB_ENV"
            echo "SIGN_KIND=test" >> "$GITHUB_ENV"
          fi

      - name: Determine version
        id: ver
        run: |
          SEMVER=$(grep -oP 'Semantic = "\K[^"]+' internal/version/version.go)
          CODE=$(grep -oP 'Code = \K[0-9]+' internal/version/version.go)
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "gogio=$SEMVER.$CODE" >> "$GITHUB_OUTPUT"

      # gogio picks the output format from the file extension: .apk for a
      # sideloadable package, .aab for a Play Console app bundle. Both are
      # built from the same signed inputs so their version code matches.
      - name: Build APK
        env:
          GOFLAGS: -trimpath   # reproducible builds: no local paths in the binary
        run: |
          gogio -target android -arch arm64,amd64 \
            -appid org.vayumail.mobile \
            -version ${{ steps.ver.outputs.gogio }} \
            -minsdk 24 -targetsdk 34 \
            -signkey release.keystore -signpass "$SIGN_PASS" \
            -o vayumail-${{ steps.ver.outputs.semver }}.apk \
            ./cmd/vayumail

      - name: Build AAB (Play Store bundle)
        env:
          GOFLAGS: -trimpath
        run: |
          gogio -target android -arch arm64,amd64 \
            -appid org.vayumail.mobile \
            -version ${{ steps.ver.outputs.gogio }} \
            -minsdk 24 -targetsdk 34 \
            -signkey release.keystore -signpass "$SIGN_PASS" \
            -o vayumail-${{ steps.ver.outputs.semver }}.aab \
            ./cmd/vayumail

      - name: Verify APK signature
        run: |
          BT="$ANDROID_HOME/build-tools/34.0.0"
          "$BT/apksigner" verify --print-certs \
            vayumail-${{ steps.ver.outputs.semver }}.apk
          echo "APK signed with the $SIGN_KIND key"

      - name: Verify AAB signature
        run: |
          # apksigner is APK-only; an AAB is a signed JAR, so verify with
          # jarsigner. A test-key AAB verifies here but Play will only
          # accept an AAB signed with your registered upload key.
          jarsigner -verify -strict \
            vayumail-${{ steps.ver.outputs.semver }}.aab \
            && echo "AAB signed with the $SIGN_KIND key"

      - name: List built artifacts
        run: |
          ls -lh vayumail-*.apk vayumail-*.aab
          echo "APK for sideloading · AAB for the Play Console"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vayumail-android
          path: |
            vayumail-*.apk
            vayumail-*.aab

      # Release notes come from the version's CHANGELOG section, so the
      # release page always says what actually changed. Falls back to a
      # one-line description if the section is missing.
      - name: Extract release notes from CHANGELOG
        run: |
          SEMVER='${{ steps.ver.outputs.semver }}'
          awk -v ver="$SEMVER" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "VayuMail-Mobile $SEMVER — pure-Go sovereign email client." > release-notes.md
          fi
          {
            echo ""
            echo "### Downloads"
            echo ""
            echo "- **vayumail-${SEMVER}.apk** — install directly on your"
            echo "  Android device (sideload)."
            echo "- **vayumail-${SEMVER}.aab** — upload to the Google Play"
            echo "  Console (Play requires an App Bundle, not an APK)."
            echo ""
            echo "---"
            echo "Signed with the ${SIGN_KIND} key. Test-key builds are for"
            echo "sideloading only; set ANDROID_KEYSTORE_B64 /"
            echo "ANDROID_KEYSTORE_PASS repository secrets to produce Play"
            echo "Store-ready builds signed with your upload key."
          } >> release-notes.md

      # Publishes on tag pushes AND on manual dispatch: the tag is derived
      # from the source version (internal/version/version.go), so a
      # dispatch from main cuts exactly the release the source declares —
      # and a mistagged push can no longer ship a wrongly named release.
      # Both the APK and the AAB are attached to every release.
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.semver }}
          name: VayuMail ${{ steps.ver.outputs.semver }}
          files: |
            vayumail-*.apk
            vayumail-*.aab
          body_path: release-notes.md
