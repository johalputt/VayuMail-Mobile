name: CI
on: [push, pull_request]

jobs:
  constitution:
    name: Constitution compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Constitution gate (v1.1, all rules)
        run: sh scripts/constitution.sh

  supplychain:
    name: Supply-chain scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: govulncheck (known vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # Gio's Linux backend needs system windowing headers; the engine
      # itself is pure Go (verified in the constitution job).
      - name: Install Gio system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libx11-dev \
            libx11-xcb-dev libxkbcommon-x11-dev libxkbcommon-dev \
            libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev \
            libxfixes-dev libvulkan-dev

      - name: Format check
        run: |
          files=$(gofmt -l .)
          [ -z "$files" ] || (echo "Unformatted: $files" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test (race, deterministic)
        run: go test -race -count=1 -timeout=180s ./...

      - name: Fuzz smoke (parser hardening)
        run: |
          go test -run=NONE -fuzz=FuzzMIMEParse -fuzztime=15s ./test/
          go test -run=NONE -fuzz=FuzzHTMLToText -fuzztime=10s ./test/

      - name: Build all binaries
        run: go build -trimpath ./cmd/...

      - name: Binary size budget
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
            -o vayumail-cli-size ./cmd/vayumail-cli
          size=$(stat -c%s vayumail-cli-size)
          echo "engine binary: $((size / 1024 / 1024)) MiB ($size bytes)"
          # Lightness pillar: the headless engine stays under 40 MiB.
          [ "$size" -lt 41943040 ] || (echo "SIZE BUDGET EXCEEDED" && exit 1)

  coverage:
    name: Engine coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Coverage on engine packages
        run: |
          go test -count=1 -coverpkg=./internal/... -coverprofile=coverage.out ./test/
          go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
