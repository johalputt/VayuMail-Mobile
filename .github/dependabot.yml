version: 2
updates:
  # Go module dependencies. Every bump must keep the ADR-0006 license
  # audit true and pass the constitution gate, so group low-risk updates
  # and review the rest.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      golang-x:
        patterns: ["golang.org/x/*"]
      gio:
        patterns: ["gioui.org", "gioui.org/*"]

  # GitHub Actions used by CI and the release pipeline.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
